};

const Pulse = ({ pct, forecast }) => {

  return (
    <div className="relative h-4 w-full rounded bg-slate-100" title={`Факт ${pct}% · темп квартала ${Q.pace}% · прогноз ${forecast}%`}>
      <div className="absolute inset-y-0 left-0 rounded border border-dashed border-slate-400/70" style={{ width: Math.min(forecast, 130) / 1.3 + "%" }} />
      <div className={`absolute inset-y-0 left-0 rounded ${fColor}`} style={{ width: Math.min(pct, 130) / 1.3 + "%" }} />

  );
};

function PortfolioScreen({ openContract }) {
  const [sort, setSort] = useState("prio");
  const rows = useMemo(() => {
    const arr = [...CONTRACTS];
    if (sort === "prio") arr.sort((a, b) => (b.budget + b.extra) * Math.max(0, 100 - b.forecast) - (a.budget + a.extra) * Math.max(0, 100 - a.forecast));
    if (sort === "budget") arr.sort((a, b) => b.budget + b.extra - (a.budget + a.extra));
    if (sort === "pct") arr.sort((a, b) => a.pct - b.pct);
    return arr;
  }, [sort]);

  const totBudget = CONTRACTS.reduce((s, c) => s + c.budget + c.extra, 0);
  const wPct = Math.round(CONTRACTS.reduce((s, c) => s + c.pct * (c.budget + c.extra), 0) / totBudget);
  const wFc = Math.round(CONTRACTS.reduce((s, c) => s + c.forecast * (c.budget + c.extra), 0) / totBudget);
  const allAlarms = CONTRACTS.flatMap((c) => c.alarms.map((a) => ({ c: c.name, a, risk: c.risk })));

    <div className="grid grid-cols-1 xl:grid-cols-[1fr_340px] gap-5">

/* ── Экран · Сценарий буста: внутренний + внешний (КП производителю) ── */

function ScenarioScreen() {
  const [mode, setMode] = useState("ext");

  /* ВНУТРЕННИЙ буст — ресурсы ФХ в рамках текущих условий контракта */
  const TOTAL_PTS = 41;
  const [dist, setDist] = useState({ metro: 23, targ: 26, parac: 29 });
  const [boost, setBoost] = useState({ promo: true, spec: false, checks: false });
  const [addInn, setAddInn] = useState({ pz: true, vita: false });
  const CUR = { metro: 23, targ: 26, parac: 29 };
  const PER_PT = { metro: 26000, targ: 22500, parac: 12300 };
  const NAMES = { metro: "МЕТРОМИКОН-НЕО", targ: "ТАРЖИФОРТ", parac: "ПАРАЦЕТАМОЛ" };

  /* ВНЕШНИЙ буст — предложения в КП производителю (доп. инвестиции) */
  const [ext, setExt] = useState({ promo2: true, komvvod: true, rotate: true, pack: false, edu: false });
  const [kvK, setKvK] = useState(1.2); /* коэффициент ком. ввода: × стоимость упаковки */

  const planRub = 9600000;
  const baseFcRub = 8930000; /* 93% run-rate */

  /* внутренний эффект */
  const distAdd = Object.keys(dist).reduce((s, k) => s + Math.max(0, dist[k] - CUR[k]) * PER_PT[k], 0);
  const boostAdd = (boost.promo ? 0.07 : 0) * baseFcRub + (boost.spec ? 0.04 : 0) * baseFcRub + (boost.checks ? 0.025 : 0) * baseFcRub;
  const innAdd = (addInn.pz ? 690000 : 0) + (addInn.vita ? 410000 : 0);
  const intAdd = distAdd + boostAdd + innAdd;

  /* внешний эффект и доп. инвестиции к запросу */
  /* 1) доп. акция закупки: 12 точек с дистрибьюцией чуть ниже среднего */
  const promo2Eff = ext.promo2 ? 12 * 21000 : 0;
  const promo2Inv = ext.promo2 ? Math.round(promo2Eff * 0.18) : 0; /* повышенная инвестиция 18% */
  /* 2) ком. ввод: 8 точек с очень низким наличием; СИП МЕТРОМИКОН 475,5 ₽; 24 уп. на точку */
  const kvUnits = 8 * 24;
  const kvEff = ext.komvvod ? kvUnits * 475.5 : 0;
  const kvInv = ext.komvvod ? Math.round(kvUnits * 475.5 * kvK) : 0;
  /* 3) ротация списка: −7 незакупающих, +2 ИНН из базы ФХ */
  const rotEff = ext.rotate ? 540000 : 0;
  const rotInv = ext.rotate ? Math.round(rotEff * 0.112) : 0; /* станд. инвестиция на новый объём */
  /* 4) промо-пакет категории */
  const packEff = ext.pack ? 0.03 * baseFcRub : 0;
  const packInv = ext.pack ? Math.round(packEff * 0.14) : 0;
  /* 5) обучение + чеки */
  const eduEff = ext.edu ? 0.02 * baseFcRub : 0;
  const eduInv = ext.edu ? 60000 + Math.round(eduEff * 0.1) : 0;

  const extAdd = promo2Eff + kvEff + rotEff + packEff + eduEff;
  const extInv = promo2Inv + kvInv + rotInv + packInv + eduInv;

  const pctInt = Math.round((baseFcRub + intAdd) / planRub * 100);
  const pctAll = Math.round((baseFcRub + intAdd + extAdd) / planRub * 100);

  return (
    <div className="space-y-5">
      {/* Результат — всегда сверху */}
      <div className="bg-[#0F4C81] text-white rounded-xl px-6 py-5 flex flex-wrap items-center gap-x-10 gap-y-3">
        <div>
          <div className="text-xs opacity-70">Выполнение плана · Авексима</div>
          <div className="text-3xl font-bold tabular-nums">93% <span className="opacity-60 text-xl">→</span> {pctInt}% <span className="opacity-60 text-xl">→</span> <span className="text-emerald-300">{pctAll}%</span></div>
          <div className="text-xs opacity-60 mt-0.5">база → внутренний буст → с КП производителю</div>
        </div>
        <div>
          <div className="text-xs opacity-70">Внутренний буст (ресурсы ФХ)</div>
          <div className="text-2xl font-bold tabular-nums">+{fmtM(intAdd)} ₽</div>
        </div>
        <div>
          <div className="text-xs opacity-70">Внешний буст (КП)</div>
          <div className="text-2xl font-bold tabular-nums text-emerald-300">+{fmtM(extAdd)} ₽</div>
        </div>
        <div>
          <div className="text-xs opacity-70">Доп. инвестиции к запросу</div>
          <div className="text-2xl font-bold tabular-nums text-amber-300">{fmtM(extInv)} ₽</div>
        </div>
        <div className="ml-auto flex gap-2">
          <button className="text-sm px-4 py-2 rounded-lg bg-white text-[#0F4C81] font-bold">Экспорт КП производителю</button>
          <button className="text-sm px-4 py-2 rounded-lg border border-white/40 font-semibold">Сохранить сценарий</button>
        </div>
      </div>

      <Tabs active={mode} onChange={setMode} tabs={[["ext", "Внешний буст · КП производителю"], ["int", "Внутренний буст · ресурсы ФХ"]]} />

      {mode === "int" && (
        <div className="grid grid-cols-1 xl:grid-cols-3 gap-5">
          <Card title="1 · Допродажа SKU: дистрибьюция по точкам" right={<span className="text-xs text-slate-400">макс. {TOTAL_PTS} точки</span>}>

            <div className="space-y-4">
              {Object.keys(dist).map((k) => (
                <div key={k} className="rounded-lg border border-slate-100 px-3 py-2.5">
                  <div className="flex items-center justify-between">

/* ── ЗАКРЫТЫЙ КОНТУР · Спасатели ── */

function SaviorsScreen() {
  const [share, setShare] = useState(70);      /* % от дельты невыполнения */
  const [retro, setRetro] = useState(true);    /* есть ли уже ретро клиента */
  const [savPct, setSavPct] = useState(11);    /* повышенный % Спасателю */

  const plan = 11200000, fcRub = 7392000;      /* Акрихин: прогноз 66% */
  const invPct = 13, basePay = 8, retroPct = retro ? 8 : 0;
  const delta = plan - fcRub;
  const savVol = Math.round(delta * share / 100);
  const newPct = Math.round((fcRub + savVol) / plan * 100);
  const invBase = fcRub * invPct / 100;
  const invWith = (fcRub + savVol) * invPct / 100;
  const marginBase = fcRub * (invPct - basePay) / 100;
  const marginSav = savVol * (invPct - retroPct - Math.max(0, savPct - retroPct)) / 100;
  /* проще: выплата Спасателю на его объёме = max(savPct, ретро) */
  const payToSav = savVol * Math.max(savPct, retroPct) / 100;
  const marginWith = marginBase + savVol * invPct / 100 - payToSav;

  return (
    <div className="space-y-5">
      <LockBanner />
      <div className="bg-[#0F4C81] text-white rounded-xl px-6 py-5 flex flex-wrap items-center gap-x-12 gap-y-3">
        <div><div className="text-xs opacity-70">Контракт · Акрихин</div><div className="text-3xl font-bold tabular-nums">66% → {newPct}%</div></div>
        <div><div className="text-xs opacity-70">Объём Спасателя</div><div className="text-2xl font-bold tabular-nums">{fmtM(savVol)} ₽</div></div>
        <div><div className="text-xs opacity-70">Инвестиции в ФХ (тотал)</div><div className="text-2xl font-bold tabular-nums">{fmtM(invBase)} → {fmtM(invWith)} ₽</div></div>
        <div><div className="text-xs opacity-70">Маржа ФХ</div><div className={`text-2xl font-bold tabular-nums ${marginWith >= marginBase ? "text-emerald-300" : "text-red-300"}`}>{fmtM(marginBase)} → {fmtM(marginWith)} ₽</div></div>
        <button className="ml-auto text-sm px-4 py-2 rounded-lg bg-white text-[#0F4C81] font-bold">Экспорт КП Спасателю</button>
      </div>

      <div className="grid grid-cols-1 xl:grid-cols-[380px_1fr] gap-5">
        <Card title="Параметры расчёта">
          <div className="space-y-4 text-sm">
            <div>
              <div className="flex justify-between text-slate-500 text-xs mb-1"><span>1 · Прогноз контракта</span><span>run-rate</span></div>
              <div className="flex justify-between font-bold text-slate-800"><span>Акрихин, {Q.label}</span><span className="tabular-nums">66% · {fmtM(fcRub)} из {fmtM(plan)} ₽</span></div>
            </div>
            <div>
              <div className="text-xs text-slate-500 mb-1">2 · Недовыполнение (дельта)</div>
              <div className="font-bold text-red-700 tabular-nums text-lg">−{fmtM(delta)} ₽</div>
            </div>
            <div className="flex items-center justify-between">
              <span className="text-slate-700 font-medium">3 · Ретро клиента уже есть</span>
              <button onClick={() => setRetro(!retro)} className={`px-3 py-1.5 rounded-lg text-xs font-bold ${retro ? "bg-emerald-100 text-emerald-800" : "bg-slate-100 text-slate-500"}`}>{retro ? "Да · 8%" : "Нет"}</button>
            </div>
            <div className="flex items-center justify-between">
              <span className="text-slate-700 font-medium">4 · Объём Спасателя от дельты</span>
              <Num v={share} set={setShare} step={5} max={100} />
            </div>
            <div className="text-xs text-slate-400 -mt-2">= {fmt(savVol)} ₽ · можно задать и в рублях</div>
            <div className="flex items-center justify-between">
              <span className="text-slate-700 font-medium">6 · Повышенный % Спасателю</span>

          </div>
        </Card>

        <div className="space-y-5">
          <Card title="5 и 7 · Экономика: без Спасателя / со Спасателем">
            <table className="w-full text-sm">
              <thead><tr className="border-b border-slate-100"><Th></Th><Th>Без Спасателя</Th><Th>Со Спасателем</Th><Th>Δ</Th></tr></thead>
              <tbody>
                {[
                  ["Объём контракта, ₽", fcRub, fcRub + savVol],
                  ["Выполнение плана", "66%", newPct + "%"],
                  ["Инвестиции производителя в ФХ (" + invPct + "%), ₽", invBase, invWith],
                  ["Выплаты клиентам (станд. " + basePay + "%), ₽", fcRub * basePay / 100, fcRub * basePay / 100],

/* ── Приложение ── */

function App() {
  const [screen, setScreen] = useState("week");
  const NAV_KAM = [["week", "Моя неделя"], ["portfolio", "Мой портфель"], ["contract", "Контракт · Авексима"], ["recon", "Сверка данных"], ["scenario", "Сценарий буста"], ["premium", "Моя премия"]];
  const NAV_LOCK = [["saviors", "Спасатели"], ["economics", "Экономика"], ["team", "Свод КАМ"], ["settings", "Настройки"]];

  const NavBtn = ({ k, l, locked }) => (
    <button onClick={() => setScreen(k)}
      className={`text-sm px-3 py-2 rounded-lg whitespace-nowrap ${screen === k ? (locked ? "bg-violet-700 text-white font-semibold" : "bg-[#0F4C81] text-white font-semibold") : locked ? "text-violet-700 hover:bg-violet-50" : "text-slate-600 hover:bg-slate-100"}`}>
      {locked && "🔒 "}{l}
    </button>
  );

  return (
    <div className="min-h-screen bg-[#F2F4F7] text-slate-800" style={{ fontFamily: "Inter, system-ui, -apple-system, sans-serif" }}>
      <header className="bg-white border-b border-slate-200 sticky top-0 z-10">
        <div className="max-w-[1480px] mx-auto px-5 py-3 flex items-center gap-5 flex-wrap">
          <div className="flex items-center gap-2.5">
            <div className="w-9 h-9 rounded-lg bg-[#0F4C81] text-white grid place-items-center text-sm font-bold">ФХ</div>
            <div>
              <div className="text-sm font-bold leading-tight">ФармХаб CRM · КАМ</div>
              <div className="text-xs text-slate-400 leading-tight">мок v4 · данные тестовые · {Q.label}, день {Q.day}/{Q.days}</div>
            </div>
          </div>
          <nav className="flex items-center gap-1 flex-wrap">
            {NAV_KAM.map(([k, l]) => <NavBtn key={k} k={k} l={l} />)}
            <div className="flex items-center gap-1 ml-2 pl-3 border-l-2 border-violet-200 bg-violet-50/60 rounded-lg px-2 py-1">
              <span className="text-[10px] uppercase tracking-wide text-violet-500 font-bold mr-1">По правам доступа</span>
              {NAV_LOCK.map(([k, l]) => <NavBtn key={k} k={k} l={l} locked />)}
            </div>
          </nav>
          <div className="ml-auto text-xs text-slate-400 whitespace-nowrap">Скокнина Анна · КАМ <span className="text-violet-500">(демо: закрытый контур открыт)</span></div>
        </div>
      </header>
      <main className="max-w-[1480px] mx-auto px-5 py-5">
        {screen === "week" && <WeekScreen go={(a) => setScreen(a.includes("Сценарий") ? "scenario" : a.includes("Сверка") || a.includes("Журнал") ? "recon" : a.includes("контрактов") ? "portfolio" : "contract")} />}
        {screen === "portfolio" && <PortfolioScreen openContract={() => setScreen("contract")} />}
        {screen === "contract" && <ContractScreen goScenario={() => setScreen("scenario")} />}
        {screen === "recon" && <ReconScreen />}
        {screen === "scenario" && <ScenarioScreen />}
        {screen === "premium" && <PremiumScreen />}
        {screen === "saviors" && <SaviorsScreen />}
        {screen === "economics" && <EconomicsScreen />}
        {screen === "team" && <TeamScreen openContract={() => setScreen("contract")} />}
        {screen === "settings" && <SettingsScreen />}
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);

</script>
</body>
</html>
